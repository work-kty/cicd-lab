name: CI Pipeline

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'k8s/**'          # 배포 커밋(YAML만 변경)은 CI 재트리거 안 함 (루프 방지 1차)

env:
  REGISTRY: ghcr.io
  OWNER: work-kty

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: write      # ← read에서 write로! 봇이 레포에 커밋해야 하니까
      packages: write

    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: WAS 이미지 빌드 & push
        uses: docker/build-push-action@v6
        with:
          context: ./was
          push: true
          cache-from: type=gha          # 이전 실행의 레이어 캐시 재사용
          cache-to: type=gha,mode=max   # 이번 레이어를 캐시에 저장
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/cicd-was:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/cicd-was:latest

      - name: WEB 이미지 빌드 & push
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/cicd-web:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/cicd-web:latest

      - name: 배포 매니페스트 태그 갱신 (해법 A의 심장)
        run: |
          sed -i "s|\(image: ghcr.io/${{ env.OWNER }}/cicd-was:\).*|\1${{ github.sha }}|" k8s/was-deployment.yaml
          sed -i "s|\(image: ghcr.io/${{ env.OWNER }}/cicd-web:\).*|\1${{ github.sha }}|" k8s/web-deployment.yaml
          echo "── 변경 결과 확인 ──"
          grep "image:" k8s/*.yaml

      - name: 봇 커밋 & push
        run: |
          git config user.name "cicd-bot"
          git config user.email "bot@users.noreply.github.com"
          git add k8s/was-deployment.yaml k8s/web-deployment.yaml
          git diff --cached --quiet && echo "변경 없음, 스킵" && exit 0
          git commit -m "deploy: 이미지 태그 ${GITHUB_SHA::7} 자동 갱신 [skip ci]"
          git push